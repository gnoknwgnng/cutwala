<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 550" width="100%" height="100%">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6A00"/>
      <stop offset="100%" stop-color="#EE4B00"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#FF5500" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 1. Ground Concentric Circles -->
  <g transform="translate(250, 500)">
    <!-- Outer Black Ring -->
    <ellipse cx="0" cy="0" rx="100" ry="24" fill="none" stroke="#121417" stroke-width="12"/>
    <!-- Middle Orange Ring -->
    <ellipse cx="0" cy="0" rx="70" ry="16" fill="none" stroke="url(#orangeGrad)" stroke-width="10"/>
    <!-- Inner Black Ring -->
    <ellipse cx="0" cy="0" rx="40" ry="9" fill="none" stroke="#121417" stroke-width="7"/>
  </g>

  <!-- 2. Main Teardrop Pin -->
  <g filter="url(#shadow)">
    <path d="M 250 50 
             C 140 50, 60 130, 60 240 
             C 60 330, 160 420, 250 495 
             C 340 420, 440 330, 440 240 
             C 440 130, 360 50, 250 50 Z" 
          fill="url(#orangeGrad)" fill-rule="evenodd"/>
    
    <!-- White Circular Inner Cutout -->
    <circle cx="250" cy="235" r="135" fill="#FFFFFF"/>
  </g>

  <!-- 3. Barber Chair (Inside Left) -->
  <g transform="translate(145, 130)">
    <!-- Headrest -->
    <rect x="25" y="10" width="40" height="22" rx="6" fill="url(#orangeGrad)"/>
    <rect x="38" y="32" width="14" height="12" fill="#121417"/>

    <!-- Backrest -->
    <path d="M 18 44 C 18 40, 72 40, 72 44 L 70 120 C 70 125, 20 125, 20 120 Z" fill="#121417"/>

    <!-- Armrest Left & Right -->
    <rect x="10" y="80" width="12" height="35" rx="5" fill="url(#orangeGrad)"/>
    <rect x="68" y="80" width="12" height="35" rx="5" fill="url(#orangeGrad)"/>
    <rect x="12" y="75" width="66" height="10" rx="4" fill="url(#orangeGrad)"/>

    <!-- Seat Cushion -->
    <rect x="15" y="115" width="60" height="22" rx="7" fill="#121417"/>

    <!-- Hydraulic Shaft & Base -->
    <rect x="40" y="137" width="10" height="30" fill="#121417"/>
    <!-- Footrest Lever -->
    <line x1="30" y1="150" x2="40" y2="155" stroke="#121417" stroke-width="4" stroke-linecap="round"/>
    <circle cx="28" cy="149" r="4" fill="#121417"/>
    <!-- Base Plate -->
    <ellipse cx="45" cy="170" rx="35" ry="10" fill="#121417"/>
  </g>

  <!-- 4. Hand & Smartphone with Booking Checkmark (Inside Right) -->
  <g transform="translate(260, 160)">
    <!-- Smartphone Frame -->
    <rect x="30" y="15" width="60" height="110" rx="12" fill="#FFFFFF" stroke="#121417" stroke-width="6"/>
    <rect x="48" y="20" width="24" height="4" rx="2" fill="#121417"/>

    <!-- Screen Text "BOOKING" -->
    <text x="60" y="38" font-family="system-ui, sans-serif" font-weight="900" font-size="8" fill="#FF5500" text-anchor="middle" letter-spacing="0.5">BOOKING</text>

    <!-- Orange Checkmark Circle inside Phone -->
    <circle cx="60" cy="65" r="18" fill="url(#orangeGrad)"/>
    <path d="M 52 65 L 57 70 L 68 59" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Black Hand holding phone -->
    <path d="M 22 50 C 15 50, 15 62, 24 62 L 32 62 L 32 50 Z" fill="#121417"/>
    <path d="M 20 66 C 13 66, 13 78, 22 78 L 32 78 L 32 66 Z" fill="#121417"/>
    <path d="M 20 82 C 13 82, 13 94, 22 94 L 32 94 L 32 82 Z" fill="#121417"/>
    <path d="M 22 98 C 16 98, 16 108, 24 108 L 32 108 L 32 98 Z" fill="#121417"/>
    <!-- Thumb & Palm Grip -->
    <path d="M 85 45 C 98 60, 95 85, 75 115 L 45 140 C 35 125, 45 105, 32 95 L 32 45 C 50 45, 70 30, 85 45 Z" fill="#121417"/>
  </g>
</svg>
